<header
  class="sticky-top bg-surface border-bottom border-white/10 d-flex align-items-center justify-content-end px-4 py-3 z-40"
>
  <div class="flex items-center gap-lg">
    <div class="flex items-center gap-sm">
      <!-- Theme Toggle -->
      <button
        class="p-2 text-on-surface-variant hover:text-primary transition-colors active:scale-95 duration-200"
        id="theme-toggle"
        type="button"
        title="Toggle Theme"
        (click)="toggleTheme.emit()"
      >
        <span class="material-symbols-outlined" id="theme-toggle-icon">{{ themeToggleIcon }}</span>
      </button>
      <button class="relative p-2 text-on-surface-variant hover:text-primary transition-colors active:scale-95 duration-200" type="button">
        <span class="material-symbols-outlined">notifications</span>
        <span class="absolute top-2.5 right-2.5 w-2 h-2 bg-chart-green rounded-full"></span>
      </button>
      <button class="p-2 text-on-surface-variant hover:text-primary transition-colors active:scale-95 duration-200" type="button">
        <span class="material-symbols-outlined">settings</span>
      </button>
    </div>

    <div class="h-8 w-[1px] bg-white/10 mx-2"></div>

    <div class="text-right">
      <p class="font-label-md top-header-clock font-mono" id="terminal-clock">{{ clockLabel }}</p>
    </div>

    <div
      class="flex items-center gap-md pl-lg border-l border-white/10 cursor-pointer group"
      id="sidebar-profile-trigger"
      (click)="openProfilePanel.emit()"
    >
      <img
        class="w-8 h-8 rounded-full border border-white/10 shrink-0 group-hover:border-primary/50 transition-colors"
        src="https://lh3.googleusercontent.com/aida-public/AB6AXuDXXpP7CN_DohNV4M-jSm4rVi_X5bvwyt5wcewq4ozXOCgCFua0WWDIVtiOqG6c7pgeLmdkZME7U0R7oSU8MseLxMTc4gJ_YRbxwViI_OeN_s7lkvOaXsuKQr-m3D3H65Rn3v8m-761ZGXoCXCryvMdLMci4xsaJE0pMNisediP1OZNgQqWt9t2v4YWGSmzOyAfzMQsTShoxZSLSdQnQshLLwZAzHldAwChRh2N7h7lXn-cuC_q5wgTeJGMplhdH5dIzfi6PnC5LNE"
        alt="avatar"
      />
      <span class="material-symbols-outlined text-on-surface-variant group-hover:text-primary transition-colors">expand_more</span>
    </div>
  </div>
</header>
