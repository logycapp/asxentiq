<div class="px-lg mb-xl sidebar-logo relative">
    <img
      class="sidebar-brand-logo sidebar-text"
      id="sidebar-brand-logo"
      [src]="sidebarBrandLogo"
      alt="Asxentiq"
    />
    <div class="sidebar-brand-copy sidebar-text">
      <p class="text-[10px] text-on-surface-variant font-medium uppercase tracking-[0.2em] mt-1">
        Platform Access
      </p>
    </div>
    <button
      class="absolute -right-3 top-2 w-8 h-8 bg-surface-container/95 border border-white/10 rounded-full flex items-center justify-center text-on-surface-variant hover:text-primary hover:border-primary/50 transition-all z-10 shadow-lg sidebar-toggle-button"
      id="sidebar-toggle"
      type="button"
      (click)="toggleSidebar.emit()"
    >
      <span class="material-symbols-outlined text-[18px]" id="toggle-icon">{{ isSidebarCollapsed ? 'dock_to_right' : 'dock_to_left' }}</span>
    </button>
  </div>

  <div class="px-md mb-md sidebar-text">
    <div class="flex items-center bg-white/5 border border-white/10 rounded-lg px-3 py-2 focus-within:border-primary/50 transition-all">
      <span class="material-symbols-outlined text-on-surface-variant text-[18px] mr-2">search</span>
      <input
        class="bg-transparent border-none focus:ring-0 text-body-sm text-on-surface w-full p-0 placeholder:text-on-surface-variant"
        placeholder="Search..."
        type="text"
      />
    </div>
  </div>

  <nav class="flex-1 space-y-1 px-md overflow-y-auto" id="sidebar-nav">
    <ng-container *ngFor="let item of menuItems; trackBy: trackByRoute">
      <!-- Item with children (submenu) -->
      <div *ngIf="item.children && item.children.length > 0" class="has-submenu" [attr.data-submenu-id]="submenuId(item)">
        <button
          #submenuBtn
          class="sidebar-item w-full flex items-center justify-between text-on-surface-variant pl-4 pr-2 py-3 hover:bg-white/5 hover:text-on-surface transition-all group"
          type="button"
          (click)="onToggleSubmenu(submenuId(item), submenuBtn)"
        >
          <div class="flex items-center gap-md">
            <span class="material-symbols-outlined opacity-70 group-hover:opacity-100 group-hover:text-primary">{{ mapIcon(item.icon) }}</span>
            <span class="font-label-md sidebar-text tracking-wider">{{ item.label }}</span>
          </div>
          <span class="material-symbols-outlined text-[18px] expand-icon group-hover:text-primary" [class.rotated]="isSubmenuOpen(submenuId(item))">expand_more</span>
        </button>
        <div
          class="submenu submenu-outer ml-4 mt-2"
          [id]="submenuId(item)"
          [class.open]="isSubmenuOpen(submenuId(item))"
        >
          <div class="submenu-panel rounded-2xl border p-2">
            <a
              *ngFor="let child of item.children; trackBy: trackByChildRoute"
              class="submenu-link flex items-center gap-3 rounded-xl px-4 py-3 text-sm font-medium text-on-surface-variant transition-all duration-200"
              [routerLink]="child.route"
              routerLinkActive="submenu-link-active"
              [routerLinkActiveOptions]="{ exact: true }"
            >
              <span class="submenu-dot shrink-0"></span>
              {{ child.label }}
            </a>
          </div>
        </div>
      </div>

      <!-- Item without children -->
      <a
        *ngIf="!item.children || item.children.length === 0"
        class="sidebar-item flex items-center gap-md text-on-surface-variant pl-4 py-3 hover:bg-white/5 hover:text-on-surface transition-all group"
        [routerLink]="item.route"
        routerLinkActive="sidebar-item-active text-primary font-semibold bg-primary/5 glow-accent-cyan border-l-2 border-primary"
        [routerLinkActiveOptions]="{ exact: item.exact }"
      >
        <span class="material-symbols-outlined opacity-70 group-hover:opacity-100 group-hover:text-primary">{{ mapIcon(item.icon) }}</span>
        <span class="font-label-md sidebar-text tracking-wider">{{ item.label }}</span>
      </a>
    </ng-container>
  </nav>
