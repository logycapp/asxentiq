<section class="surface-card p-4 p-xl-5">
  <div class="d-flex flex-column flex-lg-row align-items-lg-end justify-content-between gap-3 mb-4">
    <div>
      <span class="soft-badge mb-3">Prueba</span>
      <h1 class="h2 mb-2">Formulario de prueba</h1>
      <p class="text-secondary mb-0">Envía dato1, dato2 y un archivo para validar la respuesta del backend.</p>
    </div>

    <a routerLink="/users" class="btn btn-outline-primary">Volver al listado</a>
  </div>

  <ngb-alert *ngIf="errorMessage" type="danger" [dismissible]="true" (closed)="errorMessage = ''" class="mb-3">
    {{ errorMessage }}
  </ngb-alert>

  <form [formGroup]="form" (ngSubmit)="submit()">
    <div class="row g-3">
      <div class="col-lg-6">
        <label class="form-label" for="dato1">Dato 1</label>
        <input id="dato1" class="form-control" type="text" formControlName="dato1" placeholder="Primer dato">
        <div class="text-danger small mt-1" *ngIf="form.controls.dato1.touched && form.controls.dato1.invalid">Dato 1 es obligatorio.</div>
      </div>

      <div class="col-lg-6">
        <label class="form-label" for="dato2">Dato 2</label>
        <input id="dato2" class="form-control" type="text" formControlName="dato2" placeholder="Segundo dato">
        <div class="text-danger small mt-1" *ngIf="form.controls.dato2.touched && form.controls.dato2.invalid">Dato 2 es obligatorio.</div>
      </div>

      <div class="col-12">
        <label class="form-label" for="adjunto">Adjunto</label>
        <input id="adjunto" class="form-control" type="file" (change)="onFileSelected($event)">
        <div class="text-secondary small mt-2">
          Archivo seleccionado: <strong>{{ selectedFile?.name || 'ninguno' }}</strong>
        </div>
      </div>
    </div>

    <div class="d-flex flex-wrap gap-2 mt-4">
      <button class="btn btn-primary" type="submit" [disabled]="loading">
        {{ loading ? 'Enviando...' : 'Enviar datos' }}
      </button>
      <button class="btn btn-outline-secondary" type="button" (click)="form.reset(); selectedFile = null; errorMessage = ''; response = null;">
        Limpiar
      </button>
    </div>
  </form>

  <div class="mt-4" *ngIf="response">
    <h2 class="h4 mb-3">Respuesta del servidor</h2>
    <pre class="surface-card p-3 mb-0">{{ response | json }}</pre>
  </div>
</section>
